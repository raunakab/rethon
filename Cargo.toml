[workspace]
members = ["libs/tokenizer", "libs/aggregator", "libs/structurizer"]
resolver = "3"
package.version = "0.1.0"
package.edition = "2024"

[workspace.dependencies]
unicode-segmentation = "1.12.0"
rstest = "0.25.0"
clap.version = "4.5.39"
clap.features = ["derive"]
anyhow.version = "1.0.98"
anyhow.features = ["backtrace"]
tokenizer = { path = "libs/tokenizer" }
aggregator = { path = "libs/aggregator" }
structurizer = { path = "libs/structurizer" }

[package]
name = "rethon"
version.workspace = true
edition.workspace = true

[dependencies]
clap.workspace = true
anyhow.workspace = true
